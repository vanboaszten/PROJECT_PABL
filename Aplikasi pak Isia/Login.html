
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .screen {
    background: #f0f4f8;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 1.5rem;
  }
  .card {
    background: #fff; border-radius: 18px;
    padding: 2rem 1.75rem 1.5rem;
    width: 100%; max-width: 360px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.07);
  }
  .logo-wrap { display: flex; flex-direction: column; align-items: center; margin-bottom: 1.5rem; }
  .logo-icon {
    background: #1a56db; width: 52px; height: 52px;
    border-radius: 14px; display: flex; align-items: center; justify-content: center; margin-bottom: 8px;
  }
  .brand-name { font-size: 20px; font-weight: 700; letter-spacing: 1px; color: #1a56db; }
  .brand-sub { font-size: 10px; letter-spacing: 2px; color: #6b7280; margin-top: 1px; }
  h1 { font-size: 22px; font-weight: 700; color: #111827; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #6b7280; margin-bottom: 1.5rem; line-height: 1.5; }
  .field { margin-bottom: 1rem; }
  .field label { font-size: 13px; font-weight: 500; color: #374151; display: block; margin-bottom: 5px; }
  .label-row { display: flex; justify-content: space-between; align-items: center; }
  .forgot { font-size: 12px; color: #1a56db; text-decoration: none; font-weight: 500; }
  .input-wrap {
    position: relative; background: #f0f4f8;
    border-radius: 10px; border: 1.5px solid transparent; transition: border 0.2s;
  }
  .input-wrap:focus-within { border-color: #1a56db; background: #fff; }
  .input-icon {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    color: #9ca3af; font-size: 16px; pointer-events: none;
  }
  .input-wrap input {
    width: 100%; padding: 10px 38px 10px 36px;
    background: transparent; border: none; outline: none;
    font-size: 14px; color: #111827; border-radius: 10px;
  }
  .input-wrap input::placeholder { color: #9ca3af; }
  .toggle-pw {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; color: #9ca3af; font-size: 16px;
    display: flex; align-items: center; padding: 0;
  }
  .remember { display: flex; align-items: center; gap: 8px; margin-bottom: 1.25rem; }
  .remember input[type=checkbox] { width: 16px; height: 16px; accent-color: #1a56db; cursor: pointer; }
  .remember span { font-size: 13px; color: #374151; }
  .btn-primary {
    width: 100%; padding: 12px; background: #1a56db; color: #fff;
    border: none; border-radius: 10px; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: background 0.2s, transform 0.1s; margin-bottom: 1.25rem;
  }
  .btn-primary:hover { background: #fafafa; }
  .btn-primary:active { transform: scale(0.98); }
  .divider { display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem; }
  .divider span { font-size: 12px; color: #9ca3af; white-space: nowrap; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #e5e7eb; }
  .social-row { display: flex; gap: 10px; margin-bottom: 1.5rem; }
  .btn-google {
    flex: 1; padding: 10px 8px; border-radius: 10px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 7px;
    background: #ffffff; color: #3c4043;
    border: 1.5px solid #dadce0;
    transition: background 0.15s;
  }
  .btn-google:hover { background: #f8f9fa; }
  .btn-facebook {
    flex: 1; padding: 10px 8px; border-radius: 10px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 7px;
    background: #ffffff; color: #ffffff;
    border: 1.5px solid #dadce0;
    transition: background 0.15s;
  }
  .btn-facebook:hover { background: #d8e8fc; }
  .signup-row { text-align: center; font-size: 13px; color: #000000; margin-bottom: 1rem; }
  .signup-row a { color: #000000; font-weight: 600; text-decoration: none; }
  .footer { text-align: center; font-size: 11px; color: #9ca3af; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(60px);
    background: #111827; color: #fff; padding: 10px 20px;
    border-radius: 10px; font-size: 13px; opacity: 0;
    transition: all 0.3s; pointer-events: none; white-space: nowrap; z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>

<div class="screen">
  <div class="card">
    <div class="logo-wrap">
      <div class="logo-icon">
        <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
          <path d="M4 15 C7 7, 23 7, 26 15 C23 23, 7 23, 4 15Z" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="1.5"/>
          <path d="M9 15 C11 11, 19 11, 21 15 C19 19, 11 19, 9 15Z" fill="white" opacity="0.85"/>
          <circle cx="15" cy="15" r="3.5" fill="#1a56db"/>
        </svg>
      </div>
      <div class="brand-name">FINCOM'S</div>
      <div class="brand-sub">BALIKPAPAN</div>
    </div>

    <h1>Selamat Datang di FINCOM'S</h1>
    <p class="subtitle">Silakan masuk untuk melanjutkan akses ke komunitas Anda.</p>

    <div class="field">
      <label>Username atau Email</label>
      <div class="input-wrap">
        <i class="ti ti-mail input-icon"></i>
        <input type="text" id="email" placeholder="Contoh: aryasenpai@email.com" />
      </div>
    </div>

    <div class="field">
      <div class="label-row">
        <label>Kata Sandi</label>
        <a href="#" class="forgot" onclick="return false;">Lupa Kata Sandi?</a>
      </div>
      <div class="input-wrap">
        <i class="ti ti-lock input-icon"></i>
        <input type="password" id="password" placeholder="Minimal 8 karakter" />
        <button class="toggle-pw" onclick="togglePw()" aria-label="Tampilkan kata sandi">
          <i class="ti ti-eye" id="eye-icon"></i>
        </button>
      </div>
    </div>

    <div class="remember">
      <input type="checkbox" id="remember" />
      <span>Ingat saya di perangkat ini</span>
    </div>

    <button class="btn-primary" onclick="handleLogin()">Masuk</button>

    <div class="divider"><span>Atau masuk dengan</span></div>

    <div class="social-row">
      <!-- Google: white bg, border abu, logo warna asli, teks hitam -->
      <button class="btn-google" onclick="socialLogin('Google')">
        <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        <span style="color:#3c4043;">Google</span>
      </button>

      <!-- Facebook: bg biru muda, teks & logo biru -->
      <button class="btn-facebook" onclick="socialLogin('Facebook')">
        <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;">
          <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" fill="#1877f2"/>
        </svg>
        <span style="color:#0084ff;">Facebook</span>
      </button>
    </div>

    <div class="signup-row">
      Belum punya akun? <a href="#" onclick="return false;">Daftar sekarang</a>
    </div>

    <div class="footer">© 2026 FINCOM'S, Balikpapan.</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
function togglePw() {
  const inp = document.getElementById('password');
  const icon = document.getElementById('eye-icon');
  if (inp.type === 'password') {
    inp.type = 'text'; icon.className = 'ti ti-eye-off';
  } else {
    inp.type = 'password'; icon.className = 'ti ti-eye';
  }
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
function handleLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email) { showToast('Masukkan username atau email'); return; }
  if (password.length < 8) { showToast('Kata sandi minimal 8 karakter'); return; }
  showToast('Sedang masuk...');
}
function socialLogin(p) { showToast('Masuk dengan ' + p + '...'); }
</script>
