<!DOCTYPE html>

<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700&amp;family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-low": "#f3f3fd",
                        "error": "#ba1a1a",
                        "on-error-container": "#93000a",
                        "outline": "#737685",
                        "tertiary-fixed": "#dfe3e9",
                        "surface-dim": "#d9d9e3",
                        "primary": "#00328a",
                        "inverse-surface": "#2e3038",
                        "inverse-primary": "#b3c5ff",
                        "outline-variant": "#c3c6d6",
                        "on-primary-fixed": "#00174a",
                        "on-tertiary-container": "#bfc4c9",
                        "surface-tint": "#2156ca",
                        "on-secondary-container": "#56656e",
                        "surface-variant": "#e2e2ec",
                        "surface-container-lowest": "#ffffff",
                        "surface-container": "#ededf7",
                        "surface-container-highest": "#e2e2ec",
                        "error-container": "#ffdad6",
                        "tertiary-container": "#4c5156",
                        "on-primary-container": "#afc1ff",
                        "on-secondary": "#ffffff",
                        "on-primary": "#ffffff",
                        "secondary": "#526069",
                        "surface-bright": "#faf8ff",
                        "on-tertiary-fixed-variant": "#42474c",
                        "tertiary": "#353a3f",
                        "surface-container-high": "#e7e7f1",
                        "secondary-fixed-dim": "#bac9d3",
                        "on-background": "#191b22",
                        "secondary-container": "#d3e2ed",
                        "primary-container": "#0047bb",
                        "primary-fixed-dim": "#b3c5ff",
                        "tertiary-fixed-dim": "#c2c7cd",
                        "on-secondary-fixed": "#0f1d25",
                        "surface": "#faf8ff",
                        "on-surface-variant": "#434653",
                        "background": "#faf8ff",
                        "inverse-on-surface": "#f0f0fa",
                        "on-secondary-fixed-variant": "#3b4951",
                        "on-tertiary-fixed": "#171c20",
                        "on-error": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "primary-fixed": "#dbe1ff",
                        "on-primary-fixed-variant": "#003ea6",
                        "on-surface": "#191b22",
                        "secondary-fixed": "#d6e5ef"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "card-padding": "16px",
                        "container-margin": "20px",
                        "inline-gap": "12px",
                        "stack-gap": "16px",
                        "section-padding": "24px"
                    },
                    "fontFamily": {
                        "headline-sm": ["Manrope"],
                        "label-sm": ["Inter"],
                        "body-md": ["Inter"],
                        "display-lg": ["Manrope"],
                        "headline-md": ["Manrope"],
                        "label-bold": ["Inter"],
                        "body-lg": ["Inter"]
                    },
                    "fontSize": {
                        "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "display-lg": ["32px", {"lineHeight": "40px", "fontWeight": "700"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                        "label-bold": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #faf8ff;
            color: #191b22;
            -webkit-font-smoothing: antialiased;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col font-body-md">
<!-- Top Navigation Bar -->
<header class="sticky top-0 z-50 flex justify-between items-center w-full px-container-margin py-4 bg-surface dark:bg-background shadow-sm dark:shadow-none">
<button class="flex items-center justify-center p-2 rounded-full hover:bg-surface-variant/50 transition-colors active:scale-95 duration-100">
<span class="material-symbols-outlined text-primary dark:text-inverse-primary">arrow_back</span>
</button>
<div class="text-headline-md font-headline-md font-bold text-primary dark:text-inverse-primary">
            FINCOM
        </div>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<main class="flex-1 w-full max-w-md mx-auto px-container-margin py-8">
<!-- Title Section -->
<section class="mb-stack-gap">
<h1 class="text-display-lg font-display-lg text-on-surface mb-2">Buat Akun Baru</h1>
<p class="text-body-lg font-body-lg text-on-surface-variant">Bergabunglah dengan komunitas Balikpapan hari ini.</p>
</section>
<!-- Registration Form -->
<form class="flex flex-col gap-inline-gap">
<!-- Full Name -->
<div class="group">
<label class="text-label-bold font-label-bold text-secondary mb-2 block">Nama Lengkap</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-on-surface-variant group-focus-within:text-primary">person</span>
<input class="w-full pl-12 pr-4 py-4 bg-[#E3F2FD] border-none rounded-xl text-on-surface placeholder:text-on-surface-variant/60 focus:ring-2 focus:ring-primary focus:bg-white transition-all outline-none" placeholder="Masukkan nama lengkap" type="text"/>
</div>
</div>
<!-- Email/Username -->
<div class="group">
<label class="text-label-bold font-label-bold text-secondary mb-2 block">Username atau Email</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-on-surface-variant group-focus-within:text-primary">alternate_email</span>
<input class="w-full pl-12 pr-4 py-4 bg-[#E3F2FD] border-none rounded-xl text-on-surface placeholder:text-on-surface-variant/60 focus:ring-2 focus:ring-primary focus:bg-white transition-all outline-none" placeholder="username@email.com" type="text"/>
</div>
</div>
<!-- Password -->
<div class="group">
<label class="text-label-bold font-label-bold text-secondary mb-2 block">Kata Sandi</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-on-surface-variant group-focus-within:text-primary">lock</span>
<input class="w-full pl-12 pr-4 py-4 bg-[#E3F2FD] border-none rounded-xl text-on-surface placeholder:text-on-surface-variant/60 focus:ring-2 focus:ring-primary focus:bg-white transition-all outline-none" placeholder="Min. 8 karakter" type="password"/>
<button class="absolute right-4 text-on-surface-variant" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Confirm Password -->
<div class="group">
<label class="text-label-bold font-label-bold text-secondary mb-2 block">Konfirmasi Kata Sandi</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-on-surface-variant group-focus-within:text-primary">shield</span>
<input class="w-full pl-12 pr-4 py-4 bg-[#E3F2FD] border-none rounded-xl text-on-surface placeholder:text-on-surface-variant/60 focus:ring-2 focus:ring-primary focus:bg-white transition-all outline-none" placeholder="Ulangi kata sandi" type="password"/>
</div>
</div>
<!-- Terms & Conditions -->
<label class="flex items-start gap-3 mt-2 cursor-pointer">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary mt-0.5" type="checkbox"/>
<span class="text-label-sm font-label-sm text-on-surface-variant leading-tight">
                    Saya setuju dengan <span class="text-primary font-bold">Syarat dan Ketentuan</span> serta <span class="text-primary font-bold">Kebijakan Privasi</span> FINCOM.
                </span>
</label>
<!-- Register Button -->
<button class="mt-4 w-full py-4 bg-primary text-on-primary rounded-xl font-bold text-body-lg shadow-lg shadow-primary/20 hover:bg-primary-container transition-all active:scale-[0.98]" type="submit">
                Daftar
            </button>
</form>
<!-- Login Link -->
<div class="text-center mt-6">
<p class="text-body-md text-on-surface-variant">
                Sudah punya akun? 
                <a class="text-primary font-bold hover:underline" href="#">Daftar sekarang</a>
</p>
</div>
<!-- Social Divider -->
<div class="relative flex items-center my-8">
<div class="flex-grow border-t border-outline-variant/30"></div>
<span class="flex-shrink mx-4 text-label-bold font-label-bold text-outline uppercase">ATAU GUNAKAN</span>
<div class="flex-grow border-t border-outline-variant/30"></div>
</div>
<!-- Social Buttons -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-3 px-4 bg-white border border-outline-variant/30 rounded-xl hover:bg-surface-container-low transition-colors shadow-sm active:scale-95">
<img alt="Google" class="w-5 h-5" src="/>
<span class="text-label-bold font-label-bold text-secondary">Google</span>
</button>
<button class="flex items-center justify-center gap-2 py-3 px-4 bg-white border border-outline-variant/30 rounded-xl hover:bg-surface-container-low transition-colors shadow-sm active:scale-95">
<svg class="w-5 h-5 text-[#1877F2]" fill="currentColor" viewbox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"></path></svg>
<span class="text-label-bold font-label-bold text-secondary">Facebook</span>
</button>
</div>
<!-- Featured Community Illustration -->
</main>
<!-- Footer Space -->
<footer class="py-8 px-container-margin text-center">
<p class="text-label-sm font-label-sm text-outline-variant">© 2024 FINCOM Balikpapan. Digital Town Square.</p>
</footer>
<!-- Decorative Canvas Elements (Asymmetric Layout) -->
</body></html>
